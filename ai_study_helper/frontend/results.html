<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Helper 🎓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .flash-message { animation: fadeOut 4s forwards; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        /* Loader */
        .loader {
            border-top-color: #8b5cf6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center gap-2">
                        <span class="text-2xl">🎓</span>
                        <span class="font-bold text-xl tracking-tight text-gray-900">AI Study Helper</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4" id="nav-links">
                    <!-- Nav links injected via JS based on auth state -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash Messages Container -->
    <div id="flash-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-4xl mx-auto">
    <!-- Hero Score Section -->
    <div id="scoreHero" class="bg-white rounded-2xl shadow-md border p-8 text-center mb-8 relative overflow-hidden">
        <!-- Background decoration -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-50 rounded-full opacity-50"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-50 rounded-full opacity-50"></div>
        
        <div class="relative z-10">
            <h2 class="text-gray-500 font-medium uppercase tracking-widest text-sm mb-2">Your Score</h2>
            <div class="flex items-center justify-center gap-4 mb-4">
                <span id="scoreText" class="text-6xl font-extrabold text-gray-900">-- / --</span>
            </div>
            <div id="badgeContainer" class="mt-4"></div>
            
            <div class="mt-8 flex gap-4 justify-center">
                <a href="index.html" class="px-6 py-2.5 bg-purple-600 text-white rounded-lg font-medium hover:bg-purple-700 transition-colors shadow-sm">
                    Try Another Quiz →
                </a>
                <a href="history.html" class="px-6 py-2.5 bg-white border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors">
                    View History
                </a>
            </div>
        </div>
    </div>

    <h3 class="text-xl font-bold mb-6 text-gray-800">Review Your Answers</h3>
    <div id="reviewContainer" class="space-y-6">
        <div class="text-center py-12 text-gray-500">Loading results...</div>
    </div>
</div>
    </main>

    <footer class="bg-white border-t py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2026 AI Study Helper. All rights reserved.
        </div>
    </footer>

    <!-- Sliding Session Logic -->
    <script src="sliding-session.js"></script>

    <!-- Core App Logic -->
    <script>
        // Flash message helper
        function showFlash(message, type = 'success') {
            const container = document.getElementById('flash-container');
            const el = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-500' : 'bg-green-500';
            el.className = `flash-message ${bgClass} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-0 opacity-100`;
            
            const icon = type === 'error' ? '⚠️' : '✅';
            el.innerHTML = `<span>${icon}</span><span class="font-medium">${message}</span>`;
            
            container.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300);
            }, 4000);
        }

        
        const API_BASE = 'http://127.0.0.1:5000';

        // JWT API Helper
        async function apiFetch(url, options = {}) {
            // Prevent double prefixing
            if (!url.startsWith('http')) {
                url = API_BASE + url;
            }
    
            const access = localStorage.getItem('access_token');
            options.headers = { ...options.headers, 'Authorization': `Bearer ${access}` };
            
            // Set Content-Type only if not sending FormData
            if (!(options.body instanceof FormData)) {
                options.headers['Content-Type'] = 'application/json';
            }

            let res = await fetch(url, options);

            if (res.status === 401) {
                const refresh = localStorage.getItem('refresh_token');
                if (!refresh) {
                    logout();
                    return res;
                }
                
                const refreshRes = await fetch(API_BASE + '/refresh', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${refresh}` }
                });
                
                if (refreshRes.ok) {
                    const data = await refreshRes.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    options.headers['Authorization'] = `Bearer ${data.access}`;
                    res = await fetch(url, options);
                } else {
                    logout();
                }
            }
            return res;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Auth Check & Nav Setup
        async function checkAuth() {
            const token = localStorage.getItem('access_token');
            const path = window.location.pathname;
            const isAuthPage = path.includes('login.html') || path.includes('register.html');

            const navContainer = document.getElementById('nav-links');

            if (!token) {
                if (!isAuthPage) {
                    window.location.href = 'login.html';
                }
                navContainer.innerHTML = `
                    <a href="login.html" class="text-gray-600 hover:text-gray-900 font-medium">Login</a>
                    <a href="register.html" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-purple-700 transition-colors">Register</a>
                `;
                return;
            }

            if (isAuthPage) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await apiFetch('/verify');
                if (res.ok) {
                    const data = await res.json();
                    const username = localStorage.getItem('username') || data.user.username;
                    
                    navContainer.innerHTML = `
                        <a href="index.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path === '/' || path.endsWith('index.html') ? 'text-purple-600' : ''}">Home</a>
                        <a href="history.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path.includes('history.html') ? 'text-purple-600' : ''}">History</a>
                        <a href="profile.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path.includes('profile.html') ? 'text-purple-600' : ''}">Profile</a>
                        <div class="h-6 w-px bg-gray-300 mx-2"></div>
                        <span class="text-gray-900 font-semibold flex items-center gap-2">
                            <div class="w-8 h-8 bg-purple-100 text-purple-700 rounded-full flex items-center justify-center font-bold">
                                ${username.charAt(0).toUpperCase()}
                            </div>
                            ${username}
                        </span>
                        <button onclick="logout()" class="ml-4 text-sm text-red-600 hover:text-red-800 font-medium transition-colors">Logout</button>
                    `;
                    
                    // Dispatch custom event for pages that need user data
                    window.dispatchEvent(new CustomEvent('userVerified', { detail: data.user }));
                }
            } catch (e) {
                console.error("Auth verification failed", e);
            }
        }

        // Run checkAuth on page load
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
    <script>
document.addEventListener('DOMContentLoaded', async () => {
    // Extract ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const resultId = urlParams.get('id');

    try {
        const res = await apiFetch(`/results-data/${resultId}`);
        const data = await res.json();

        if (!res.ok) {
            document.getElementById('reviewContainer').innerHTML = `<p class="text-center text-red-500">${data.message || 'Failed to load results'}</p>`;
            return;
        }

        const result = data.result;
        
        // Update Hero Score
        document.getElementById('scoreText').textContent = `${result.correct_ans_count} / ${result.total_ques_count}`;
        
        const percentage = Math.round((result.correct_ans_count / result.total_ques_count) * 100);
        let badgeHtml = '';
        if (percentage >= 80) {
            badgeHtml = `<span class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold bg-green-100 text-green-800">🎉 Excellent! (${percentage}%)</span>`;
        } else if (percentage >= 60) {
            badgeHtml = `<span class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold bg-yellow-100 text-yellow-800">👍 Good Job! (${percentage}%)</span>`;
        } else {
            badgeHtml = `<span class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold bg-red-100 text-red-800">💪 Keep Practicing! (${percentage}%)</span>`;
        }
        document.getElementById('badgeContainer').innerHTML = badgeHtml;

        // Try to recover original text from sessionStorage if available
        let quizDataObj = {};
        const rawData = sessionStorage.getItem('quiz_data');
        if (rawData) {
            try {
                const parsed = JSON.parse(rawData);
                // convert to array for easy lookup if needed, but here we just map by index
                Object.values(parsed).forEach((item, idx) => {
                    quizDataObj[idx] = item;
                });
            } catch(e){}
        }

        // Render Review List
        const html = result.questions.map((q, index) => {
            // q has: question, correct_ans, user_selected_ans, is_correct
            // We only have the keys (opt1, opt2) in DB, not the full text. 
            // We use session storage to recover full text if it's the recent quiz.
            
            const originalQ = quizDataObj[index] || {};
            const userText = originalQ[q.user_selected_ans] || q.user_selected_ans || 'No Answer';
            const correctText = originalQ[q.correct_ans] || q.correct_ans;

            let answerBox = '';
            if (q.is_correct) {
                answerBox = `
                    <div class="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg flex items-start gap-3">
                        <span class="text-green-500 mt-0.5">✅</span>
                        <div>
                            <p class="text-sm text-green-800 font-medium">Your answer (Correct)</p>
                            <p class="text-green-900 mt-1">${userText}</p>
                        </div>
                    </div>
                `;
            } else {
                answerBox = `
                    <div class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3">
                        <span class="text-red-500 mt-0.5">❌</span>
                        <div>
                            <p class="text-sm text-red-800 font-medium">Your answer</p>
                            <p class="text-red-900 mt-1">${userText}</p>
                        </div>
                    </div>
                    <div class="mt-3 p-4 bg-green-50 border border-green-200 rounded-lg flex items-start gap-3">
                        <span class="text-green-500 mt-0.5">👉</span>
                        <div>
                            <p class="text-sm text-green-800 font-medium">Correct answer</p>
                            <p class="text-green-900 mt-1">${correctText}</p>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <h4 class="font-semibold text-lg text-gray-900"><span class="text-gray-400 mr-2">${index + 1}.</span> ${q.question}</h4>
                    ${answerBox}
                </div>
            `;
        }).join('');

        document.getElementById('reviewContainer').innerHTML = html;

    } catch (err) {
        document.getElementById('reviewContainer').innerHTML = `<p class="text-center text-red-500">Network error loading results.</p>`;
    }
});
</script>
</body>
</html>
