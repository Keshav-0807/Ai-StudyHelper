<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Helper 🎓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .flash-message { animation: fadeOut 4s forwards; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        /* Loader */
        .loader {
            border-top-color: #8b5cf6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center gap-2">
                        <span class="text-2xl">🎓</span>
                        <span class="font-bold text-xl tracking-tight text-gray-900">AI Study Helper</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4" id="nav-links">
                    <!-- Nav links injected via JS based on auth state -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash Messages Container -->
    <div id="flash-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-3xl mx-auto mt-4">
    <!-- Header -->
    <div class="mb-8 flex justify-between items-center border-b pb-4">
        <div>
            <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                <span>📄</span> <span id="quizFilename">Document Quiz</span>
            </h2>
            <p class="text-sm text-gray-500 mt-1" id="quizProgressText">Question 1 of X</p>
        </div>
        <div class="w-1/3 bg-gray-200 rounded-full h-2.5">
            <div id="progressBar" class="bg-purple-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <!-- Question Container -->
    <div id="questionContainer" class="bg-white shadow-lg rounded-2xl p-8 border border-gray-100 min-h-[400px] flex flex-col">
        <h3 id="questionText" class="text-2xl font-semibold text-gray-900 mb-8 leading-snug">Loading question...</h3>
        
        <div id="optionsContainer" class="space-y-4 flex-grow">
            <!-- Options injected here via JS -->
        </div>

        <!-- Navigation Buttons -->
        <div class="mt-8 flex justify-between items-center pt-6 border-t border-gray-100">
            <button id="prevBtn" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-colors hidden">
                ← Previous
            </button>
            <div class="flex-grow"></div>
            <button id="clearBtn" class="mr-4 px-4 py-2 border border-red-200 text-red-600 rounded-lg font-medium hover:bg-red-50 transition-colors hidden">
                Clear Response
            </button>
            <button id="nextBtn" class="px-6 py-2 bg-purple-100 text-purple-700 rounded-lg font-medium hover:bg-purple-200 transition-colors">
                Next →
            </button>
            <button id="submitBtn" class="px-6 py-2 bg-green-500 text-white rounded-lg font-bold hover:bg-green-600 transition-colors hidden shadow-md">
                Submit Quiz 🎯
            </button>
        </div>
    </div>
</div>

<!-- Submit Confirmation Modal -->
<div id="submitModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full mx-4">
        <h3 class="text-2xl font-bold mb-4">Submit Quiz?</h3>
        <p class="text-gray-600 mb-6">Are you sure you want to submit? You cannot change your answers after submission.</p>
        <div class="flex gap-4 justify-end">
            <button id="cancelSubmitBtn" class="px-4 py-2 border rounded-lg text-gray-700 hover:bg-gray-50 font-medium">Cancel</button>
            <button id="confirmSubmitBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold">Yes, Submit</button>
        </div>
    </div>
</div>
    </main>

    <footer class="bg-white border-t py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2026 AI Study Helper. All rights reserved.
        </div>
    </footer>

    <!-- Sliding Session Logic -->
    <script src="sliding-session.js"></script>

    <!-- Core App Logic -->
    <script>
        // Flash message helper
        function showFlash(message, type = 'success') {
            const container = document.getElementById('flash-container');
            const el = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-500' : 'bg-green-500';
            el.className = `flash-message ${bgClass} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-0 opacity-100`;
            
            const icon = type === 'error' ? '⚠️' : '✅';
            el.innerHTML = `<span>${icon}</span><span class="font-medium">${message}</span>`;
            
            container.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300);
            }, 4000);
        }

        
        const API_BASE = 'http://127.0.0.1:5000';

        // JWT API Helper
        async function apiFetch(url, options = {}) {
            // Prevent double prefixing
            if (!url.startsWith('http')) {
                url = API_BASE + url;
            }
    
            const access = localStorage.getItem('access_token');
            options.headers = { ...options.headers, 'Authorization': `Bearer ${access}` };
            
            // Set Content-Type only if not sending FormData
            if (!(options.body instanceof FormData)) {
                options.headers['Content-Type'] = 'application/json';
            }

            let res = await fetch(url, options);

            if (res.status === 401) {
                const refresh = localStorage.getItem('refresh_token');
                if (!refresh) {
                    logout();
                    return res;
                }
                
                const refreshRes = await fetch(API_BASE + '/refresh', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${refresh}` }
                });
                
                if (refreshRes.ok) {
                    const data = await refreshRes.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    options.headers['Authorization'] = `Bearer ${data.access}`;
                    res = await fetch(url, options);
                } else {
                    logout();
                }
            }
            return res;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Auth Check & Nav Setup
        async function checkAuth() {
            const token = localStorage.getItem('access_token');
            const path = window.location.pathname;
            const isAuthPage = path.includes('login.html') || path.includes('register.html');

            const navContainer = document.getElementById('nav-links');

            if (!token) {
                if (!isAuthPage) {
                    window.location.href = 'login.html';
                }
                navContainer.innerHTML = `
                    <a href="login.html" class="text-gray-600 hover:text-gray-900 font-medium">Login</a>
                    <a href="register.html" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-purple-700 transition-colors">Register</a>
                `;
                return;
            }

            if (isAuthPage) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await apiFetch('/verify');
                if (res.ok) {
                    const data = await res.json();
                    const username = localStorage.getItem('username') || data.user.username;
                    
                    navContainer.innerHTML = `
                        <a href="index.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path === '/' || path.endsWith('index.html') ? 'text-purple-600' : ''}">Home</a>
                        <a href="history.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path.includes('history.html') ? 'text-purple-600' : ''}">History</a>
                        <a href="profile.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path.includes('profile.html') ? 'text-purple-600' : ''}">Profile</a>
                        <div class="h-6 w-px bg-gray-300 mx-2"></div>
                        <span class="text-gray-900 font-semibold flex items-center gap-2">
                            <div class="w-8 h-8 bg-purple-100 text-purple-700 rounded-full flex items-center justify-center font-bold">
                                ${username.charAt(0).toUpperCase()}
                            </div>
                            ${username}
                        </span>
                        <button onclick="logout()" class="ml-4 text-sm text-red-600 hover:text-red-800 font-medium transition-colors">Logout</button>
                    `;
                    
                    // Dispatch custom event for pages that need user data
                    window.dispatchEvent(new CustomEvent('userVerified', { detail: data.user }));
                }
            } catch (e) {
                console.error("Auth verification failed", e);
            }
        }

        // Run checkAuth on page load
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
    <script>
document.addEventListener('DOMContentLoaded', () => {
    const rawData = sessionStorage.getItem('quiz_data');
    if (!rawData) {
        window.location.href = 'index.html';
        return;
    }

    const quizData = JSON.parse(rawData);
    const questions = Object.keys(quizData).map(key => ({ id: key, ...quizData[key] }));
    const numQuestionsSelected = parseInt(sessionStorage.getItem('num_questions') || questions.length);
    const filename = sessionStorage.getItem('filename') || 'Document Quiz';
    
    document.getElementById('quizFilename').textContent = filename;

    let currentIndex = 0;
    // userAnswers stores the option key (e.g. "opt1", "opt2") chosen by the user
    const userAnswers = new Array(questions.length).fill(null);

    const qText = document.getElementById('questionText');
    const optsContainer = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const progText = document.getElementById('quizProgressText');
    const progBar = document.getElementById('progressBar');

    function renderQuestion(index) {
        const q = questions[index];
        qText.textContent = q.ques;
        
        progText.textContent = `Question ${index + 1} of ${questions.length}`;
        progBar.style.width = `${((index + 1) / questions.length) * 100}%`;

        optsContainer.innerHTML = ['opt1', 'opt2', 'opt3', 'opt4'].map(optKey => {
            const isSelected = userAnswers[index] === optKey;
            return `
                <div class="option-card cursor-pointer p-4 border-2 rounded-xl transition-all ${isSelected ? 'border-purple-600 bg-purple-50 ring-1 ring-purple-600' : 'border-gray-200 hover:border-purple-300 hover:bg-gray-50'}" data-key="${optKey}">
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center ${isSelected ? 'border-purple-600' : 'border-gray-300'}">
                            ${isSelected ? '<div class="w-2.5 h-2.5 bg-purple-600 rounded-full"></div>' : ''}
                        </div>
                        <span class="${isSelected ? 'text-purple-900 font-medium' : 'text-gray-700'}">${q[optKey]}</span>
                    </div>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', () => {
                userAnswers[index] = card.dataset.key;
                renderQuestion(index); // re-render to update selection UI
            });
        });

        prevBtn.classList.toggle('hidden', index === 0);
        
        if (index === questions.length - 1) {
            nextBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
        } else {
            nextBtn.classList.remove('hidden');
            submitBtn.classList.add('hidden');
        }

        if (userAnswers[index]) {
            clearBtn.classList.remove('hidden');
        } else {
            clearBtn.classList.add('hidden');
        }
    }

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) renderQuestion(--currentIndex);
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < questions.length - 1) renderQuestion(++currentIndex);
    });

    clearBtn.addEventListener('click', () => {
        userAnswers[currentIndex] = null;
        renderQuestion(currentIndex);
    });

    // Submit Modal Logic
    const submitModal = document.getElementById('submitModal');
    submitBtn.addEventListener('click', () => submitModal.classList.remove('hidden'));
    document.getElementById('cancelSubmitBtn').addEventListener('click', () => submitModal.classList.add('hidden'));

    document.getElementById('confirmSubmitBtn').addEventListener('click', async () => {
        const btn = document.getElementById('confirmSubmitBtn');
        btn.innerText = 'Submitting...';
        btn.disabled = true;

        let correctCount = 0;
        let answeredCount = 0;
        const formattedAnswers = questions.map((q, i) => {
            const uAns = userAnswers[i];
            const isCorrect = uAns === q.ans;
            if (uAns) answeredCount++;
            if (isCorrect) correctCount++;

            return {
                question: q.ques,
                userAnswer: uAns || "",
                correctAnswer: q.ans,
                isCorrect: isCorrect
            };
        });

        const payload = {
            totalQuestions: questions.length,
            answeredQuestions: answeredCount,
            correctAnswers: correctCount,
            numQuestionsSelected: numQuestionsSelected,
            answers: formattedAnswers
        };

        try {
            const res = await apiFetch('/submit-result', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                // Keep quiz data in session so results page can display full text for options,
                // but clear num_questions so next generation is clean
                sessionStorage.setItem('last_result_id', data.result_id);
                window.location.href = `results.html?id=${data.result_id}`;
            } else {
                showFlash(data.message || 'Error submitting quiz', 'error');
                submitModal.classList.add('hidden');
                btn.innerText = 'Yes, Submit';
                btn.disabled = false;
            }
        } catch (err) {
            showFlash('Network error', 'error');
            submitModal.classList.add('hidden');
            btn.innerText = 'Yes, Submit';
            btn.disabled = false;
        }
    });

    renderQuestion(0);
});
</script>
</body>
</html>
