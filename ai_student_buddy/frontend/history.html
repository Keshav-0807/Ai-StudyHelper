<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Helper 🎓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .flash-message { animation: fadeOut 4s forwards; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        /* Loader */
        .loader {
            border-top-color: #8b5cf6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center gap-2">
                        <span class="text-2xl">🎓</span>
                        <span class="font-bold text-xl tracking-tight text-gray-900">AI Study Helper</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4" id="nav-links">
                    <!-- Nav links injected via JS based on auth state -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash Messages Container -->
    <div id="flash-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Your Quiz History</h1>
        <a href="index.html" class="bg-purple-100 text-purple-700 px-4 py-2 rounded-lg font-medium hover:bg-purple-200 transition-colors">
            + New Quiz
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"># ID</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Questions Selected</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Score</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Percentage</th>
                        <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody" class="bg-white divide-y divide-gray-200">
                    <!-- Data loaded via JS -->
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                            Loading your history...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
    </main>

    <footer class="bg-white border-t py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2026 AI Study Helper. All rights reserved.
        </div>
    </footer>

    <!-- Core App Logic -->
    <script>
        // Flash message helper
        function showFlash(message, type = 'success') {
            const container = document.getElementById('flash-container');
            const el = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-500' : 'bg-green-500';
            el.className = `flash-message ${bgClass} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-0 opacity-100`;
            
            const icon = type === 'error' ? '⚠️' : '✅';
            el.innerHTML = `<span>${icon}</span><span class="font-medium">${message}</span>`;
            
            container.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300);
            }, 4000);
        }

        
        const API_BASE = 'http://127.0.0.1:5000';

        // JWT API Helper
        async function apiFetch(url, options = {}) {
            // Prevent double prefixing
            if (!url.startsWith('http')) {
                url = API_BASE + url;
            }
    
            const access = localStorage.getItem('access_token');
            options.headers = { ...options.headers, 'Authorization': `Bearer ${access}` };
            
            // Set Content-Type only if not sending FormData
            if (!(options.body instanceof FormData)) {
                options.headers['Content-Type'] = 'application/json';
            }

            let res = await fetch(url, options);

            if (res.status === 401) {
                const refresh = localStorage.getItem('refresh_token');
                if (!refresh) {
                    logout();
                    return res;
                }
                
                const refreshRes = await fetch(API_BASE + '/refresh', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${refresh}` }
                });
                
                if (refreshRes.ok) {
                    const data = await refreshRes.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    options.headers['Authorization'] = `Bearer ${data.access}`;
                    res = await fetch(url, options);
                } else {
                    logout();
                }
            }
            return res;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Auth Check & Nav Setup
        async function checkAuth() {
            const token = localStorage.getItem('access_token');
            const path = window.location.pathname;
            const isAuthPage = path.includes('login.html') || path.includes('register.html');

            const navContainer = document.getElementById('nav-links');

            if (!token) {
                if (!isAuthPage) {
                    window.location.href = 'login.html';
                }
                navContainer.innerHTML = `
                    <a href="login.html" class="text-gray-600 hover:text-gray-900 font-medium">Login</a>
                    <a href="register.html" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-purple-700 transition-colors">Register</a>
                `;
                return;
            }

            if (isAuthPage) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await apiFetch('/verify');
                if (res.ok) {
                    const data = await res.json();
                    const username = localStorage.getItem('username') || data.user.username;
                    
                    navContainer.innerHTML = `
                        <a href="index.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path === '/' || path.endsWith('index.html') ? 'text-purple-600' : ''}">Home</a>
                        <a href="history.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path.includes('history.html') ? 'text-purple-600' : ''}">History</a>
                        <a href="profile.html" class="text-gray-600 hover:text-purple-600 font-medium transition-colors ${path.includes('profile.html') ? 'text-purple-600' : ''}">Profile</a>
                        <div class="h-6 w-px bg-gray-300 mx-2"></div>
                        <span class="text-gray-900 font-semibold flex items-center gap-2">
                            <div class="w-8 h-8 bg-purple-100 text-purple-700 rounded-full flex items-center justify-center font-bold">
                                ${username.charAt(0).toUpperCase()}
                            </div>
                            ${username}
                        </span>
                        <button onclick="logout()" class="ml-4 text-sm text-red-600 hover:text-red-800 font-medium transition-colors">Logout</button>
                    `;
                    
                    // Dispatch custom event for pages that need user data
                    window.dispatchEvent(new CustomEvent('userVerified', { detail: data.user }));
                }
            } catch (e) {
                console.error("Auth verification failed", e);
            }
        }

        // Run checkAuth on page load
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
    <script>
document.addEventListener('DOMContentLoaded', async () => {
    const tbody = document.getElementById('historyTableBody');

    try {
        const res = await apiFetch('/results-data');
        const data = await res.json();

        if (res.ok) {
            const results = data.results || [];
            
            if (results.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-16 text-center">
                            <div class="text-5xl mb-4">📝</div>
                            <h3 class="text-lg font-medium text-gray-900 mb-1">No quizzes yet!</h3>
                            <p class="text-gray-500">Upload a document to get started.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = results.map(r => {
                const percentage = Math.round((r.correct_ans_count / r.total_ques_count) * 100) || 0;
                let badgeClass = percentage >= 80 ? 'bg-green-100 text-green-800' : 
                               percentage >= 60 ? 'bg-yellow-100 text-yellow-800' : 
                               'bg-red-100 text-red-800';

                // Handle missing num_questions_selected for backwards compatibility if needed, though default is 10
                const numQuestions = r.num_questions_selected || r.total_ques_count;

                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">#${r.id}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">${numQuestions}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                            ${r.correct_ans_count} / ${r.total_ques_count}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2.5 py-0.5 inline-flex text-xs leading-5 font-semibold rounded-full ${badgeClass}">
                                ${percentage}%
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a href="results.html?id=${r.id}" class="text-purple-600 hover:text-purple-900 transition-colors">View Results →</a>
                        </td>
                    </tr>
                `;
            }).join('');
        } else {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Failed to load history</td></tr>`;
        }
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Network error</td></tr>`;
    }
});
</script>
</body>
</html>
